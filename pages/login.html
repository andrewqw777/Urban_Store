<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cont</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* BACKGROUND */
body{
  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.15), transparent 40%),
    linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
    url("https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1920&auto=format&fit=crop") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:white;
}

/* CARD */
.auth-card{
  background:rgba(20,20,20,0.75);
  backdrop-filter:blur(20px);
  padding:40px;
  border-radius:25px;
  width:100%;
  max-width:400px;
}

/* TABS */
.tabs{
  position:relative;
  display:flex;
  background:rgba(255,255,255,0.05);
  border-radius:30px;
  padding:5px;
  margin-bottom:20px;
}

.slider{
  position:absolute;
  top:5px;
  left:5px;
  width:calc(50% - 5px);
  height:calc(100% - 10px);
  background:#FFD700;
  border-radius:25px;
  transition:0.4s;
}

.tab{
  flex:1;
  padding:12px;
  border:none;
  background:transparent;
  color:#aaa;
  cursor:pointer;
  z-index:2;
}

.tab.active{
  color:black;
  font-weight:bold;
}

/* TITLE */
h1{
  text-align:center;
  margin-bottom:20px;
}

/* INPUT */
.input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #2f2f2f;
  margin-bottom:10px;
  background:rgba(255,255,255,0.05);
  color:white;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#FFD700;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* LINKS */
.link{
  margin-top:10px;
  text-align:center;
  color:#aaa;
  cursor:pointer;
  font-size:14px;
}

.link:hover{color:#FFD700}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#111;
  color:white;
  padding:14px 20px;
  border-radius:12px;
  border:1px solid #FFD700;
  box-shadow:0 0 20px rgba(255,215,0,0.2);
  opacity:0;
  transition:0.4s;
  z-index:999;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}


.back{
  position:absolute;
  top:20px;
  left:20px;
  width:45px;
  height:45px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:20px;
  transition:0.3s;
}

.back:hover{
  background:#FFD700;
  color:black;
}
</style>
</head>

<body>
<div class="back" onclick="history.back()">←</div>

<div class="auth-card">

  <div class="tabs">
    <div class="slider" id="slider"></div>
    <button id="loginTab" class="tab active">Log in</button>
    <button id="signupTab" class="tab">Sign up</button>
  </div>

  <h1 id="title">Bine ai revenit</h1>

  <form id="authForm">

    <input type="text" id="name" class="input" placeholder="Numele tău" style="display:none">

    <input type="email" id="email" class="input" placeholder="Email">

    <input type="password" autocomplete="off" id="password" class="input" placeholder="Parolă">

    <input type="password" id="confirmPassword" class="input" placeholder="Confirmă parola" style="display:none">

    <button type="submit" id="actionBtn" class="btn">Intră în cont</button>

  </form>

  <div id="switchText" class="link">Nu ai cont? Creează unul</div>
  <div id="forgotPassword" class="link">Ai uitat parola?</div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");
const slider = document.getElementById("slider");

const title = document.getElementById("title");
const name = document.getElementById("name");
const confirm = document.getElementById("confirmPassword");
const btn = document.getElementById("actionBtn");
const switchText = document.getElementById("switchText");

/* LOGIN */
function showLogin(){
  slider.style.left="5px";

  loginTab.classList.add("active");
  signupTab.classList.remove("active");

  title.textContent="Bine ai revenit";
  btn.textContent="Intră în cont";

  name.style.display="none";
  confirm.style.display="none";

  switchText.textContent="Nu ai cont? Creează unul";

  window.setLoginMode();
}

/* SIGNUP */
function showSignup(){
  slider.style.left="50%";

  signupTab.classList.add("active");
  loginTab.classList.remove("active");

  title.textContent="Creează cont nou";
  btn.textContent="Creează cont";

  name.style.display="block";
  confirm.style.display="block";

  switchText.textContent="Ai deja cont? Loghează-te";

  window.setSignupMode();
}

loginTab.onclick=showLogin;
signupTab.onclick=showSignup;

switchText.onclick=()=>{
  if(signupTab.classList.contains("active")){
    showLogin();
  } else {
    showSignup();
  }
};
</script>

<script type="module" src="../js/auth.js"></script>

</body>
</html>
