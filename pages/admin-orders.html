<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Comenzi</title>
<link rel="icon" href="../images/logo.jpg" />
<link
href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#111;
}

/* NAVBAR */

.header{
position:sticky;
top:0;
width:100%;
height:80px;
background:#000;
z-index:1000;
display:flex;
align-items:center;
justify-content:center;
padding:0 30px;
}

.nav{
width:100%;
max-width:1400px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:#fff;
font-size:22px;
font-weight:bold;
}

.logo img{
width:55px;
height:55px;
border-radius:12px;
object-fit:cover;
}

.nav-links{
display:flex;
align-items:center;
gap:28px;
margin-right:20px;
}

.nav-links a{
color:#fff;
text-decoration:none;
font-size:15px;
transition:.2s;
}

.nav-links a:hover{
opacity:.7;
}

.logout-btn{
background:transparent;
border:1px solid #ef4444;
color:#ef4444;
padding:8px 14px;
border-radius:999px;
cursor:pointer;
transition:.2s;
}

.logout-btn:hover{
background:#ef4444;
color:#fff;
}

/* PAGE */

.page{
padding:40px 20px;
max-width:1400px;
margin:auto;
}

.page-top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:35px;
gap:20px;
flex-wrap:wrap;
}

.page-title{
font-size:32px;
font-weight:700;
}

.orders-count{
background:#000;
color:#fff;
padding:10px 18px;
border-radius:999px;
font-size:14px;
}

/* GRID */

.orders{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
gap:24px;
}

/* CARD */

.order{
background:#fff;
border-radius:24px;
padding:24px;
box-shadow:0 4px 18px rgba(0,0,0,.08);
transition:.2s;
}

.order:hover{
transform:translateY(-3px);
}

.order-header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:18px;
gap:15px;
flex-wrap:wrap;
}

.order-user{
font-size:22px;
font-weight:700;
}

.order-date{
font-size:13px;
color:#666;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:22px;
}

.info-box{
background:#f7f7f7;
padding:14px;
border-radius:14px;
}

.info-label{
font-size:12px;
color:#666;
margin-bottom:6px;
}

.info-value{
font-size:15px;
font-weight:600;
word-break:break-word;
}

/* PRODUCTS */

.products{
display:grid;
gap:16px;
margin-top:10px;
}

.product{
display:flex;
gap:14px;
align-items:center;
padding:14px;
border-radius:18px;
background:#fafafa;
border:1px solid #eee;
}

.product img{
width:85px;
height:85px;
object-fit:cover;
border-radius:16px;
background:#eee;
}

.product-name{
font-size:17px;
font-weight:700;
margin-bottom:6px;
}

.product-meta{
font-size:14px;
color:#555;
margin-bottom:4px;
}

.product-price{
font-size:16px;
font-weight:700;
margin-top:4px;
}

.order-actions{
margin-top:20px;
display:flex;
justify-content:flex-end;
}

.delete-order-btn{
background:#ef4444;
color:#fff;
border:none;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:700;
transition:.2s;
}

.delete-order-btn:hover{
opacity:.85;
}

/* EMPTY */

.empty{
background:#fff;
padding:50px;
border-radius:24px;
text-align:center;
font-size:18px;
color:#666;
}

/* MOBILE */

@media(max-width:700px){

.header{
height:auto;
padding:18px;
}

.nav{
flex-direction:column;
gap:15px;
}

.orders{
grid-template-columns:1fr;
}

.info-grid{
grid-template-columns:1fr;
}

.page-title{
font-size:25px;
}

.product{
align-items:flex-start;
}

.product img{
width:70px;
height:70px;
}

}

.order-notes{
  margin-top:18px;
  background:#f5f5f5;
  padding:14px;
  border-radius:14px;
  font-size:15px;
}

.order-notes p{
  margin-top:6px;
  color:#333;
}
</style>
</head>

<body>

<header class="header">

<div class="nav">

<a href="../index.html" class="logo">
<img src="../images/logo.jpg">
<span>Urban Store</span>
</a>

<div class="nav-links">

<a href="../index.html">
Catalog
</a>

<a href="../pages/adauga.html">
Adaugă produs
</a>

<button
id="logoutBtn"
class="logout-btn"
>
Logout
</button>

</div>

</div>

</header>

<div class="page">

<div class="page-top">

<h1 class="page-title">
Toate comenzile
</h1>

<div
class="orders-count"
id="ordersCount"
>
0 comenzi
</div>

</div>

<div
class="orders"
id="orders"
></div>

</div>

<script type="module">
  import { auth, db } from "../js/firebase.js";

  import {
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  import {
    collection,
    getDocs,
    query,
    orderBy,
    doc,
    getDoc,
    deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const ordersBox = document.getElementById("orders");
  const ordersCount = document.getElementById("ordersCount");
  const logoutBtn = document.getElementById("logoutBtn");

  logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
    location.href = "../index.html";
  });

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      location.href = "../index.html";
      return;
    }

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      location.href = "../index.html";
      return;
    }

    const userData = userSnap.data();

    if (userData.role !== "admin") {
      location.href = "../index.html";
      return;
    }

    loadOrders();
  });

  function formatDate(createdAt) {
    if (!createdAt) return "-";

    if (createdAt.toDate) {
      return createdAt.toDate().toLocaleString("ro-RO");
    }

    return new Date(createdAt).toLocaleString("ro-RO");
  }

  function getPaymentText(method) {
    if (method === "online") return "Achitare online";
    if (method === "cash") return "Plată la livrare / curier";
    return method || "-";
  }

  async function loadOrders() {
    const q = query(
      collection(db, "orders"),
      orderBy("createdAt", "desc")
    );

    const snap = await getDocs(q);

    ordersCount.textContent = `${snap.size} comenzi`;

    if (snap.empty) {
      ordersBox.innerHTML = `
        <div class="empty">
          Nu există comenzi.
        </div>
      `;
      return;
    }

    let html = "";

    snap.forEach((d) => {
      const order = d.data();
      const totals = order.totals || {
  subtotal: order.subtotal || 0,
  discount: order.discount || 0,
  total: order.total || 0
};
      const coupon = order.coupon || {};

      html += `
        <div class="order">
          <div class="order-header">
            <div>
              <div class="order-user">
                ${order.firstName || ""} ${order.lastName || ""}
              </div>

              <div class="order-date">
                ${formatDate(order.createdAt)}
              </div>
            </div>
          </div>

          <div class="info-grid">
            <div class="info-box">
              <div class="info-label">Email</div>
              <div class="info-value">${order.email || "-"}</div>
            </div>

            <div class="info-box">
              <div class="info-label">Telefon</div>
              <div class="info-value">${order.phone || "-"}</div>
            </div>

            <div class="info-box">
              <div class="info-label">Țară</div>
              <div class="info-value">${order.country || "Republica Moldova"}</div>
            </div>

            <div class="info-box">
              <div class="info-label">Localitate</div>
              <div class="info-value">${order.locality || "-"}</div>
            </div>

            <div class="info-box">
              <div class="info-label">Adresă</div>
              <div class="info-value">${order.address || "-"}</div>
            </div>

            <div class="info-box">
              <div class="info-label">Apartament</div>
              <div class="info-value">${order.apartment || "-"}</div>
            </div>

            <div class="info-box">
              <div class="info-label">Livrare</div>
              <div class="info-value">${order.deliveryMethod || "-"}</div>
            </div>

            <div class="info-box">
              <div class="info-label">
                Cod poștal
              </div>

              <div class="info-value">
                ${order.postalCode || "-"}
              </div>
            </div>

            <div class="info-box">
              <div class="info-label">Achitare</div>
              <div class="info-value">${getPaymentText(order.paymentMethod)}</div>
            </div>

            <div class="info-box">
              <div class="info-label">Status plată</div>
              <div class="info-value">${order.paymentStatus || "-"}</div>
            </div>

            <div class="info-box">
              <div class="info-label">Cupon</div>
              <div class="info-value">
                ${coupon.code ? `${coupon.code} (${coupon.percent || 0}%)` : "-"}
              </div>
            </div>

            <div class="info-box">
              <div class="info-label">Subtotal</div>
              <div class="info-value">${totals.subtotal || 0} MDL</div>
            </div>

            <div class="info-box">
              <div class="info-label">Reducere</div>
              <div class="info-value">${totals.discount || 0} MDL</div>
            </div>

            <div class="info-box">
              <div class="info-label">Total</div>
              <div class="info-value">${totals.total || 0} MDL</div>
            </div>
          </div>

          <div class="products">
            ${(order.items || [])
              .map(
                (item) => `
                  <div class="product">
                    <img src="${item.img || ""}" alt="">

                    <div>
                      <div class="product-name">
                        ${item.name || "Produs"}
                      </div>

                      <div class="product-meta">
                        Cantitate: ${item.qty || 1}
                      </div>

                      ${
                        item.size
                          ? `
                            <div class="product-meta">
                              Mărime: ${item.size}
                            </div>
                          `
                          : ""
                      }

                      <div class="product-price">
                        ${item.price || 0} ${item.currency || "MDL"}
                      </div>
                    </div>
                  </div>
                `
              )
              .join("")}
          </div>

          <div class="order-notes">
            <b>Note comandă:</b>
            <p>${order.notes || "Fără note"}</p>
          </div>

          <div class="order-actions">
            <button
              class="delete-order-btn"
              data-id="${d.id}"
            >
              Șterge comanda
            </button>
          </div>
        </div>
      `;
    });

    ordersBox.innerHTML = html;

    document.querySelectorAll(".delete-order-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const ok = confirm("Ștergi această comandă?");
        if (!ok) return;

        try {
          await deleteDoc(doc(db, "orders", btn.dataset.id));
          await loadOrders();
        } catch (err) {
          console.error(err);
          alert("Eroare la ștergere.");
        }
      });
    });
  }
</script>

</body>
</html>
